name: Update Prices

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch prices
        run: |
          python3 << 'PYEOF'
          import json, datetime, yfinance as yf, requests

          result = {
            'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
            'usdsgd': 0,
            'prices': {}
          }

          # ── SGD rate ──
          for url, extract in [
            ('https://api.frankfurter.app/latest?from=USD&to=SGD',  lambda d: d['rates']['SGD']),
            ('https://open.er-api.com/v6/latest/USD',               lambda d: d['rates']['SGD']),
            ('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json', lambda d: d['usd']['sgd']),
          ]:
            try:
              r = requests.get(url, timeout=10); r.raise_for_status()
              result['usdsgd'] = round(extract(r.json()), 6)
              print(f'SGD: {result["usdsgd"]} from {url}'); break
            except Exception as e:
              print(f'SGD failed {url}: {e}')

          # ── GBP/USD for SPYL ──
          gbpusd = 1.27  # fallback
          try:
            fx = yf.Ticker('GBPUSD=X')
            gbpusd = fx.fast_info.last_price
            print(f'GBPUSD: {gbpusd}')
          except Exception as e:
            print(f'GBPUSD failed: {e}')

          # ── Stock prices ──
          US_TICKERS = ['DGRO', 'FBTC', 'QQQM', 'SCHD', 'SMH', 'VGT']

          # US tickers — straightforward
          for sym in US_TICKERS:
            try:
              t = yf.Ticker(sym)
              price = t.fast_info.last_price
              result['prices'][sym] = round(float(price), 4)
              print(f'{sym}: ${result["prices"][sym]}')
            except Exception as e:
              print(f'{sym} failed: {e}')

          # SPYL — listed on LSE, USD-denominated class
          # Try multiple tickers until we get a sensible price (~$18)
          for spyl_ticker in ['SPYL.L', 'SPYL']:
            try:
              t = yf.Ticker(spyl_ticker)
              fi = t.fast_info
              price = float(fi.last_price)
              currency = getattr(fi, 'currency', 'USD')
              print(f'SPYL raw: {price} {currency} (from {spyl_ticker})')

              # Convert to USD based on currency
              if currency == 'GBp':
                price = price / 100 * gbpusd   # pence → GBP → USD
              elif currency == 'GBP':
                price = price * gbpusd           # GBP → USD
              # else already USD

              # Sanity check: SPYL should be roughly $15-$25
              if 10 < price < 50:
                result['prices']['SPYL'] = round(price, 4)
                print(f'SPYL USD: ${result["prices"]["SPYL"]}')
                break
              else:
                print(f'SPYL price {price} out of range, trying next ticker')
            except Exception as e:
              print(f'SPYL {spyl_ticker} failed: {e}')

          print('\nResult:', json.dumps(result, indent=2))
          with open('prices.json', 'w') as f:
            json.dump(result, f, indent=2)
          PYEOF

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add prices.json
          git diff --staged --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
