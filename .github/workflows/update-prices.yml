name: Update Prices

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'  # 4x daily (UTC 1,7,13,19 = SGT 9,15,21,3)
  workflow_dispatch:               # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch prices and SGD rate
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, datetime

          result = { 'timestamp': datetime.datetime.utcnow().isoformat() + 'Z', 'usdsgd': 0, 'prices': {} }

          # 1. SGD rate from frankfurter.app
          try:
            with urllib.request.urlopen('https://api.frankfurter.app/latest?from=USD&to=SGD', timeout=10) as r:
              fx = json.load(r)
              result['usdsgd'] = fx['rates']['SGD']
              result['date'] = fx['date']
              print('SGD rate:', result['usdsgd'])
          except Exception as e:
            print('SGD rate failed:', e)

          # 2. Stock prices from Yahoo Finance (server-side, no CORS)
          symbols = ['DGRO', 'FBTC', 'QQQM', 'SCHD', 'SMH', 'VGT', 'SPYL.L', 'GBPUSD=X']
          try:
            url = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + ','.join(symbols)
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req, timeout=10) as r:
              data = json.load(r)

            gbpusd = 1
            for q in data['quoteResponse']['result']:
              sym = q['symbol']
              price = q.get('regularMarketPrice', 0)
              currency = q.get('currency', 'USD')
              if sym == 'GBPUSD=X':
                gbpusd = price
              elif sym == 'SPYL.L':
                if currency == 'GBp':   price = price / 100 * gbpusd
                elif currency == 'GBP': price = price * gbpusd
                result['prices']['SPYL'] = round(price, 4)
              else:
                result['prices'][sym] = round(price, 4)

            print('Prices:', result['prices'])
          except Exception as e:
            print('Yahoo Finance failed:', e)

          with open('prices.json', 'w') as f:
            json.dump(result, f, indent=2)
          print('Done:', result)
          PYEOF

      - name: Commit prices.json
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add prices.json
          git diff --staged --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
