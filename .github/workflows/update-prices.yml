name: Update Prices

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch prices and write to data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, datetime, yfinance as yf, requests, base64, os

          result = {
            'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
            'usdsgd': 0,
            'prices': {}
          }

          # ── SGD rate ──
          for url, extract in [
            ('https://api.frankfurter.app/latest?from=USD&to=SGD',  lambda d: d['rates']['SGD']),
            ('https://open.er-api.com/v6/latest/USD',               lambda d: d['rates']['SGD']),
            ('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json', lambda d: d['usd']['sgd']),
          ]:
            try:
              r = requests.get(url, timeout=10); r.raise_for_status()
              result['usdsgd'] = round(extract(r.json()), 6)
              print(f'SGD: {result["usdsgd"]} from {url}'); break
            except Exception as e:
              print(f'SGD failed: {e}')

          # ── GBP/USD ──
          gbpusd = 1.27
          try:
            gbpusd = float(yf.Ticker('GBPUSD=X').fast_info.last_price)
            print(f'GBPUSD: {gbpusd}')
          except Exception as e:
            print(f'GBPUSD failed: {e}')

          # ── Stock prices ──
          for sym in ['DGRO', 'FBTC', 'QQQM', 'SCHD', 'SMH', 'VGT']:
            try:
              price = float(yf.Ticker(sym).fast_info.last_price)
              result['prices'][sym] = round(price, 4)
              print(f'{sym}: ${price}')
            except Exception as e:
              print(f'{sym} failed: {e}')

          for spyl_ticker in ['SPYL.L', 'SPYL']:
            try:
              fi = yf.Ticker(spyl_ticker).fast_info
              price = float(fi.last_price)
              currency = getattr(fi, 'currency', 'USD')
              print(f'SPYL raw: {price} {currency}')
              if currency == 'GBp': price = price / 100 * gbpusd
              elif currency == 'GBP': price = price * gbpusd
              if 10 < price < 50:
                result['prices']['SPYL'] = round(price, 4)
                print(f'SPYL USD: ${result["prices"]["SPYL"]}')
                break
            except Exception as e:
              print(f'SPYL {spyl_ticker} failed: {e}')

          print('\nResult:', json.dumps(result, indent=2))

          # ── Write directly to data branch via GitHub API ──
          token = os.environ['GH_TOKEN']
          owner, repo = 'danieltannn', 'TradingJournal'
          content = base64.b64encode(json.dumps(result, indent=2).encode()).decode()

          # Get current SHA if file exists
          sha = None
          r = requests.get(
            f'https://api.github.com/repos/{owner}/{repo}/contents/prices.json?ref=data',
            headers={'Authorization': f'Bearer {token}', 'X-GitHub-Api-Version': '2022-11-28'}
          )
          if r.status_code == 200:
            sha = r.json()['sha']

          body = {
            'message': f'Update prices {datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")}',
            'content': content,
            'branch': 'data'
          }
          if sha:
            body['sha'] = sha

          r = requests.put(
            f'https://api.github.com/repos/{owner}/{repo}/contents/prices.json',
            headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28'},
            json=body
          )
          print(f'GitHub write: {r.status_code}')
          PYEOF
