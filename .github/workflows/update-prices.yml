name: Update Prices

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch prices
        run: |
          python3 << 'PYEOF'
          import json, datetime
          import yfinance as yf
          import requests

          result = {
            'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
            'usdsgd': 0,
            'prices': {}
          }

          # ── SGD rate: try multiple sources ──
          sgd_sources = [
            ('frankfurter', 'https://api.frankfurter.app/latest?from=USD&to=SGD', lambda d: d['rates']['SGD']),
            ('er-api',      'https://open.er-api.com/v6/latest/USD',              lambda d: d['rates']['SGD']),
            ('cdn-api',     'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json', lambda d: d['usd']['sgd']),
          ]
          for name, url, extract in sgd_sources:
            try:
              r = requests.get(url, timeout=10)
              r.raise_for_status()
              result['usdsgd'] = round(extract(r.json()), 6)
              print(f'SGD rate from {name}: {result["usdsgd"]}')
              break
            except Exception as e:
              print(f'SGD {name} failed: {e}')

          # ── Stock prices via yfinance ──
          TICKERS = {
            'DGRO': 'DGRO', 'FBTC': 'FBTC', 'QQQM': 'QQQM',
            'SCHD': 'SCHD', 'SMH': 'SMH',   'VGT': 'VGT',
            'SPYL': 'SPYL.L',
          }
          try:
            yf_syms = list(TICKERS.values())
            data = yf.download(yf_syms, period='1d', progress=False, auto_adjust=True)
            closes = data['Close'].iloc[-1]

            # Get GBP/USD for SPYL conversion
            gbpusd = 1.0
            try:
              fx = yf.download('GBPUSD=X', period='1d', progress=False)
              gbpusd = float(fx['Close'].iloc[-1])
              print(f'GBPUSD: {gbpusd}')
            except Exception as e:
              print(f'GBPUSD failed: {e}')

            for our_sym, yf_sym in TICKERS.items():
              try:
                price = float(closes[yf_sym])
                if our_sym == 'SPYL':
                  # SPYL.L is in GBP pence on LSE
                  price = price / 100 * gbpusd
                result['prices'][our_sym] = round(price, 4)
                print(f'{our_sym}: {result["prices"][our_sym]}')
              except Exception as e:
                print(f'{our_sym} price failed: {e}')
          except Exception as e:
            print(f'yfinance batch failed: {e}')
            # Fallback: fetch individually
            for our_sym, yf_sym in TICKERS.items():
              try:
                t = yf.Ticker(yf_sym)
                price = t.fast_info.last_price
                if our_sym == 'SPYL':
                  price = price / 100 * gbpusd
                result['prices'][our_sym] = round(price, 4)
                print(f'{our_sym} (individual): {result["prices"][our_sym]}')
              except Exception as e:
                print(f'{our_sym} individual failed: {e}')

          print('\nFinal result:', json.dumps(result, indent=2))
          with open('prices.json', 'w') as f:
            json.dump(result, f, indent=2)
          PYEOF

      - name: Commit prices.json
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add prices.json
          git diff --staged --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
