<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Trade Tracker">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Trade Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <i class="ti ti-chart-line" aria-hidden="true"></i>
        <h1>Trade Tracker</h1>
      </div>
      <label class="upload-btn" aria-label="Upload CSV file">
        <input type="file" accept=".csv" id="fileInput">
        <i class="ti ti-upload" aria-hidden="true"></i>
        <span>Upload CSV</span>
      </label>
    </header>

    <main>
      <!-- Upload zone (shown when no data) -->
      <div id="uploadZone" class="upload-zone" role="button" tabindex="0" aria-label="Drop CSV file here or click to upload">
        <i class="ti ti-file-spreadsheet" aria-hidden="true"></i>
        <p class="upload-title">Drop your TastyTrade CSV here</p>
        <p class="upload-sub">or use the upload button above</p>
        <p class="upload-hint">Supports TastyTrade transactions history exports</p>
      </div>

      <!-- Dashboard (shown after data is loaded) -->
      <div id="dashboard" hidden>
        <div class="metrics" id="metricsRow"></div>

        <nav class="tabs" id="tabBar" role="tablist" aria-label="Dashboard sections"></nav>

        <div id="tabContent" role="tabpanel"></div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="app.js"></script>
</body>
</html>
